<!DOCTYPE html>
<html lang="ar" dir="rtl" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>لوحة تحكم العامل — SAN3A</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            cairo: ['Cairo', 'sans-serif'],
          },
          colors: {
            primary: {
              50: '#eff6ff', 100: '#dbeafe', 200: '#bfdbfe', 300: '#93c5fd',
              400: '#60a5fa', 500: '#3b82f6', 600: '#2563eb', 700: '#1d4ed8',
              800: '#1e40af', 900: '#1e3a8a'
            }
          }
        }
      }
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/worker-dashboard.css">
<base target="_blank">
</head>
<body class="bg-gray-50 dark:bg-gray-900 font-cairo transition-colors duration-300 min-h-screen">

  <!-- Header -->
  <header class="bg-white dark:bg-gray-800 border-b border-gray-100 dark:border-gray-700 sticky top-0 z-50 shadow-sm">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 py-3 flex justify-between items-center">
      <!-- Left: Profile & Notifications -->
      <div class="flex items-center gap-3">
        <button onclick="SAN3A.navigate('worker-profile')" class="flex items-center gap-2 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-xl px-2 py-1.5 transition-colors">
          <div class="w-10 h-10 bg-blue-600 rounded-full flex items-center justify-center">
            <span class="text-white font-bold text-sm">أ.خ</span>
          </div>
          <div class="hidden sm:block text-right">
            <p class="font-bold text-sm text-gray-900 dark:text-white">أحمد الخالدي</p>
            <p class="text-xs text-gray-500 dark:text-gray-400">عامل فني</p>
          </div>
          <span class="hidden sm:inline-flex items-center gap-1 bg-green-100 dark:bg-green-900/30 text-green-700 dark:text-green-400 text-xs font-bold px-2 py-0.5 rounded-full border border-green-200 dark:border-green-800">
            <svg class="w-3 h-3" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg>
            موثق
          </span>
        </button>
        <button onclick="showNotifications()" class="relative w-10 h-10 rounded-xl border border-gray-200 dark:border-gray-600 flex items-center justify-center text-gray-600 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-gray-700 transition-all">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/></svg>
          <span id="notif-badge" class="absolute -top-1 -left-1 bg-red-500 text-white rounded-full w-5 h-5 flex items-center justify-center text-xs font-bold">3</span>
        </button>
      </div>

      <!-- Right: Logo & Menu -->
      <div class="flex items-center gap-3">
        <div class="flex items-center gap-3">
          <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center shadow-lg shadow-blue-600/20">
            <span class="text-white font-bold text-lg">ص</span>
          </div>
          <h1 class="hidden sm:block text-2xl font-bold text-blue-800 dark:text-white tracking-tight">SAN3A</h1>
        </div>
        <button id="theme-toggle" class="w-10 h-10 rounded-xl border border-gray-200 dark:border-gray-600 flex items-center justify-center text-gray-600 dark:text-yellow-400 hover:bg-gray-50 dark:hover:bg-gray-700 transition-all">
          <svg id="moon-icon" class="w-5 h-5 hidden" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
          <svg id="sun-icon" class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><path stroke-linecap="round" stroke-linejoin="round" d="M12 1v2m0 18v2M4.22 4.22l1.42 1.42m12.72 12.72l1.42 1.42M1 12h2m18 0h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
        </button>
        <button class="sm:hidden w-10 h-10 rounded-xl border border-gray-200 dark:border-gray-600 flex items-center justify-center text-gray-600 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-gray-700 transition-all">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"/></svg>
        </button>
      </div>
    </div>
  </header>

  <!-- Main Content -->
  <main class="max-w-7xl mx-auto px-4 sm:px-6 py-8">

    <!-- Title -->
    <div class="mb-6">
      <h2 class="text-2xl font-bold text-gray-900 dark:text-white">لوحة التحكم</h2>
      <p class="text-gray-600 dark:text-gray-400 mt-1">مرحباً بك في لوحة التحكم الخاصة بك</p>
    </div>

    <!-- Tabs -->
    <div class="bg-gray-100 dark:bg-gray-700 rounded-xl p-1 mb-8 flex">
      <button id="tab-requests" onclick="switchTab('requests')" class="flex-1 py-2.5 px-4 rounded-lg font-semibold text-sm transition-all bg-blue-600 text-white shadow-md relative">
        الطلبات
        <span id="requests-badge" class="absolute -top-1 -left-1 bg-red-500 text-white rounded-full w-5 h-5 flex items-center justify-center text-xs font-bold">3</span>
      </button>
      <button id="tab-terms" onclick="switchTab('terms')" class="flex-1 py-2.5 px-4 rounded-lg font-semibold text-sm transition-all text-gray-700 dark:text-gray-300 hover:bg-gray-200 dark:hover:bg-gray-600">
        الشروط والأحكام
      </button>
      <button id="tab-ratings" onclick="switchTab('ratings')" class="flex-1 py-2.5 px-4 rounded-lg font-semibold text-sm transition-all text-gray-700 dark:text-gray-300 hover:bg-gray-200 dark:hover:bg-gray-600">
        التقييم
      </button>
    </div>

    <!-- Requests Tab -->
    <div id="content-requests" class="space-y-4">
      <div id="requests-list">
        <!-- Requests injected via JS -->
      </div>
      <div id="no-requests" class="hidden">
        <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-lg border border-gray-100 dark:border-gray-700 p-16 text-center">
          <div class="w-16 h-16 bg-blue-100 dark:bg-blue-900/30 rounded-full flex items-center justify-center mx-auto mb-4">
            <svg class="w-8 h-8 text-blue-600" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path stroke-linecap="round" stroke-linejoin="round" d="M12 6v6l4 2"/></svg>
          </div>
          <h3 class="text-gray-900 dark:text-white font-bold text-lg mb-2">لا توجد طلبات جديدة</h3>
          <p class="text-gray-500 dark:text-gray-400">ستظهر الطلبات الجديدة هنا عند توفرها</p>
        </div>
      </div>
    </div>

    <!-- Terms Tab -->
    <div id="content-terms" class="hidden">
      <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-lg border border-gray-100 dark:border-gray-700 overflow-hidden">
        <div class="px-6 py-4 border-b border-gray-100 dark:border-gray-700">
          <h3 class="font-bold text-lg text-gray-900 dark:text-white">الشروط والأحكام للعاملين</h3>
        </div>
        <div class="p-6">
          <div id="terms-list" class="space-y-6 max-h-[500px] overflow-y-auto pr-2">
            <!-- Terms injected via JS -->
          </div>

          <div class="mt-6 pt-6 border-t border-gray-100 dark:border-gray-700">
            <label class="flex items-center gap-3 p-4 bg-blue-50 dark:bg-blue-900/20 rounded-xl border-2 border-blue-200 dark:border-blue-800 cursor-pointer hover:bg-blue-100 dark:hover:bg-blue-900/30 transition-colors">
              <input type="checkbox" id="terms-checkbox" onchange="toggleTerms()" class="w-5 h-5 rounded border-2 border-blue-600 text-blue-600 focus:ring-blue-500 cursor-pointer">
              <span class="font-medium text-gray-900 dark:text-white">أوافق على الشروط والأحكام المذكورة أعلاه</span>
            </label>
          </div>
        </div>
      </div>
    </div>

    <!-- Ratings Tab -->
    <div id="content-ratings" class="hidden space-y-6">
      <!-- Average Rating Card -->
      <div class="bg-gradient-to-br from-blue-600 to-blue-700 rounded-2xl shadow-lg p-8 text-center text-white">
        <div id="avg-stars" class="flex justify-center gap-1 mb-3">
          <!-- Stars injected via JS -->
        </div>
        <div id="avg-rating" class="text-5xl font-bold mb-2">4.8</div>
        <p id="avg-text" class="text-blue-100">متوسط التقييم من 4 مراجعة</p>
      </div>

      <!-- Reviews List -->
      <div>
        <h3 class="font-bold text-lg text-gray-900 dark:text-white mb-4">آراء العملاء</h3>
        <div id="reviews-list" class="space-y-4">
          <!-- Reviews injected via JS -->
        </div>
      </div>
    </div>
  </main>

  <!-- Floating Help Button -->
  <button onclick="showHelp()" class="fixed bottom-6 left-6 w-14 h-14 rounded-full bg-blue-600 hover:bg-blue-700 text-white shadow-lg shadow-blue-600/30 flex items-center justify-center transition-all hover:scale-105 z-40">
    <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path stroke-linecap="round" stroke-linejoin="round" d="M9.09 9a3 3 0 015.83 1c0 2-3 3-3 3m0 3h.01"/></svg>
  </button>

  <!-- Notifications Modal -->
  <div id="notifications-modal" class="fixed inset-0 z-50 hidden">
    <div class="absolute inset-0 bg-black/50 backdrop-blur-sm" onclick="closeNotifications()"></div>
    <div class="absolute top-20 left-4 sm:left-auto sm:right-4 w-full sm:w-96 max-w-sm">
      <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-2xl border border-gray-100 dark:border-gray-700 overflow-hidden">
        <div class="px-6 py-4 border-b border-gray-100 dark:border-gray-700 flex items-center justify-between">
          <h3 class="font-bold text-lg text-gray-900 dark:text-white">الإشعارات</h3>
          <button onclick="closeNotifications()" class="w-8 h-8 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-700 flex items-center justify-center transition-colors">
            <svg class="w-5 h-5 text-gray-500" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
          </button>
        </div>
        <div id="notifications-list" class="max-h-[400px] overflow-y-auto p-4 space-y-3">
          <!-- Notifications injected via JS -->
        </div>
      </div>
    </div>
  </div>

  <script src="js/global.js"></script>
  <script src="js/worker-dashboard.js"></script>
</body>
</html>
