<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>لوحة التحكم — SAN3A</title>
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/admin.css">
<base target="_blank">
</head>
<body>
  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-brand">
        <div class="brand-icon">ص</div>
        <div class="brand-info">
          <h1>SAN3A</h1>
          <span class="brand-role" id="admin-role-badge">مدير عام</span>
        </div>
      </div>
    </div>
    <nav class="sidebar-nav" id="sidebar-nav">
      <button class="nav-item active" data-section="dashboard">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        <span>لوحة التحكم</span>
      </button>
      <button class="nav-item" data-section="bookings">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
        <span>الحجوزات</span>
      </button>
      <button class="nav-item" data-section="workers">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
        <span>إدارة العمال</span>
      </button>
      <button class="nav-item" data-section="users">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        <span>إدارة العملاء</span>
      </button>
      <button class="nav-item" data-section="finance">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="20" x2="12" y2="10"/><line x1="18" y1="20" x2="18" y2="4"/><line x1="6" y1="20" x2="6" y2="16"/></svg>
        <span>التقارير المالية</span>
      </button>
      <button class="nav-item" data-section="roles">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
        <span>الأدوار والصلاحيات</span>
      </button>
      <button class="nav-item" data-section="settings">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.5 15a1.65 1.65 0 0 0-1.51-1H2a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 3.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 7.5 4.5a1.65 1.65 0 0 0 1-1.51V2a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.5 9a1.65 1.65 0 0 0 1.51 1H22a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        <span>الإعدادات</span>
      </button>
    </nav>
    <div class="sidebar-footer">
      <button class="logout-btn" onclick="SAN3A.navigate('index')">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        <span>تسجيل الخروج</span>
      </button>
    </div>
  </aside>

  <!-- Mobile Sidebar Overlay -->
  <div class="sidebar-overlay" id="sidebar-overlay" onclick="toggleSidebar()"></div>

  <!-- Main Content -->
  <div class="main-wrapper">
    <!-- Header -->
    <header class="admin-header">
      <div class="header-left">
        <button class="menu-toggle" onclick="toggleSidebar()" id="menu-toggle">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <div class="header-search">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" placeholder="بحث شامل..." id="global-search">
        </div>
      </div>
      <div class="header-right">
        <button class="header-btn notification-btn" id="notif-btn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
          <span class="notif-dot"></span>
        </button>
        <div class="admin-profile">
          <div class="admin-avatar">م</div>
          <div class="admin-info">
            <p class="admin-name">مدير النظام</p>
            <span class="admin-role" id="header-role">مدير عام</span>
          </div>
        </div>
      </div>
    </header>

    <!-- Content Area -->
    <main class="admin-content" id="admin-content">
      <!-- Sections will be injected by JS -->
    </main>
  </div>

  <!-- Add Admin Modal -->
  <div class="modal-overlay" id="add-admin-modal">
    <div class="modal">
      <div class="modal-header">
        <h3>إضافة مدير جديد</h3>
        <button class="modal-close" onclick="closeModal('add-admin-modal')">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>الاسم الكامل</label>
          <input type="text" id="new-admin-name" placeholder="مثال: أحمد محمد">
        </div>
        <div class="form-group">
          <label>البريد الإلكتروني</label>
          <input type="email" id="new-admin-email" placeholder="example@san3a.com">
        </div>
        <div class="form-group">
          <label>الدور الوظيفي</label>
          <select id="new-admin-role">
            <option value="super_admin">مدير عام</option>
            <option value="booking_manager">مشرف الحجوزات</option>
            <option value="finance_manager">مشرف المالية</option>
            <option value="worker_manager">مشرف العمال</option>
          </select>
        </div>
        <div class="form-group">
          <label>كلمة المرور</label>
          <input type="password" id="new-admin-password" placeholder="••••••••">
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal('add-admin-modal')">إلغاء</button>
        <button class="btn btn-primary" onclick="addNewAdmin()">إضافة المدير</button>
      </div>
    </div>
  </div>

  <!-- Edit Prices Modal -->
  <div class="modal-overlay" id="edit-prices-modal">
    <div class="modal modal-lg">
      <div class="modal-header">
        <h3>تعديل أسعار جدية الحجز</h3>
        <button class="modal-close" onclick="closeModal('edit-prices-modal')">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="modal-body">
        <div class="prices-grid" id="prices-grid"></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal('edit-prices-modal')">إلغاء</button>
        <button class="btn btn-primary" onclick="savePrices()">حفظ التعديلات</button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast-container"></div>

  <script src="js/global.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
